<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}ShareSpace{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <section>
        <div id="header" class="bg-light border-bottom border-dark">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid px-5 py-2">
                    <div class="me-2 d-flex align-items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" fill="currentColor"
                            class="bi bi-share">
                            <path
                                d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5" />
                        </svg>
                    </div>
                    <a class="navbar-brand fw-bold text-center" href="./index.html">ShareSpace</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse g md-d-flex md-row md-align-items-center"
                        id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item ms-3 ms-lg-0 ">
                                <a class="nav-link text-black text-center" href="./index.html">Home</a>
                            </li>
                            <li class="nav-item ms-3 ms-lg-0 ">
                                <a class="nav-link text-black text-center" href="./bookmarks.html">Bookmarks</a>
                            </li>
                            <li class="nav-item ms-3 ms-lg-0 ">
                                <a class="nav-link text-black text-center" href="./enquiries.html">Enquiries</a>
                            </li>
                            <li class="nav-item ms-3 ms-lg-0">
                                <a class="nav-link px-2 text-black text-center" href="list_property.html">List
                                    Property</a>
                            </li>
                            <li class="nav-item ms-3 ms-lg-0">
                                <a class="nav-link px-2 text-black text-center" href="listings.html">My
                                    Listings</a>
                            </li>
                        </ul>

                        <div class="d-flex align-items-center justify-content-center gap-2 mt-2 mt-lg-0">

                            <form id="search-form" class="d-flex gap-2">
                                <input id="search-box" class="form-control border-dark rounded-pill" type="search"
                                    placeholder="Search">
                                <button class="btn btn-outline-dark rounded-pill px-3">Search</button>
                            </form>

                            <button class="btn btn-primary rounded-pill px-3">
                                <a href="login.html" class="text-white text-decoration-none">Login</a>
                            </button>
                            <div class="d-flex justify-content-center align-items-center text-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor"
                                    class="bi bi-person-circle" viewBox="0 0 16 16">
                                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                                    <path fill-rule="evenodd"
                                        d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                                </svg>
                            </div>

                        </div>

                    </div>
                </div>
            </nav>
        </div>
    </section>

    <div>

        {% block content %}
        {% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <footer id="footer" class="bg-light border-top border-dark mt-5">
        <div class="container py-4">
            <div class="row align-items-center text-center text-md-start">
                <div
                    class="col-12 col-md-4 mb-3 mb-md-0 d-flex justify-content-center justify-content-md-start align-items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" fill="currentColor"
                        class="bi bi-share">
                        <path
                            d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5" />
                    </svg>
                    <span class="fw-bold">ShareSpace</span>
                </div>

                <div class="col-12 col-md-4 mb-3 mb-md-0">
                    <span class="text-muted">&copy; 2026 All rights reserved</span>
                </div>

                <div class="col-12 col-md-4">
                    <ul class="nav justify-content-center justify-content-md-end">
                        <li class="nav-item">
                            <a class="nav-link px-2 text-muted" href="index.html">Contact Us</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link px-2 text-muted" href="index.html">Privacy Policy</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>


</body>

</html>
