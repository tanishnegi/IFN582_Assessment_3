{% extends 'layout.html' %}

{% block title %}
Forbidden
{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container text-center">
        <div class="card shadow-sm border-0 mx-auto" style="max-width: 560px;">
            <div class="card-body p-5">
                <h1 class="fw-bold mb-3">Access denied</h1>
                <p class="text-muted mb-4">You do not have permission to view this page.</p>
                <div class="d-flex justify-content-center gap-2">
                    <a href="{{ url_for('main.index') }}" class="btn btn-dark rounded-pill px-4">Go home</a>
                    {% if session.get('logged_in') %}
                    <a href="{{ url_for('main.logout') }}" class="btn btn-outline-dark rounded-pill px-4">Log out</a>
                    {% else %}
                    <a href="{{ url_for('main.login') }}" class="btn btn-outline-dark rounded-pill px-4">Log in</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
